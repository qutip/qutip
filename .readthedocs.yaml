# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

formats:
  - pdf

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

python:
  install:
    - requirements: doc/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - full

sphinx:
  configuration: doc/conf.py
  fail_on_warning: true
